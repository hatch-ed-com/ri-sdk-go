name: tests
permissions:
    contents: read
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    test:
        defaults:
            run:
                shell: bash
        strategy:
            matrix:
                go-version: ["1.25", "1.26"]
        runs-on: ubuntu-latest
        steps:
            - name: Setup go environment
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ matrix.go-version }}
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Run go test
              run: scripts/test.sh
